name: Deploy Prototypes to Pages

on:
  push:
    branches: [main]
    paths: ['prototypes/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './prototypes'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Output URL
        run: |
          echo "Prototype deployed to: ${{ steps.deployment.outputs.page_url }}"
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
